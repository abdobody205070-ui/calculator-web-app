<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CASIO Calculator</title>

<style>
body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.calculator {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px #000;
    width: 280px;
}

.brand {
    color: #ccc;
    text-align: right;
    font-size: 14px;
    margin-bottom: 5px;
}

.display {
    background: #d1d5db;
    height: 60px;
    border-radius: 10px;
    margin-bottom: 15px;
    padding: 10px;
    font-size: 24px;
    text-align: right;
    overflow: hidden;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    background: #334155;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #475569;
}

.operator {
    background: #2563eb;
}

.operator:hover {
    background: #1d4ed8;
}

.equal {
    background: #16a34a;
    grid-row: span 2;
}

.equal:hover {
    background: #15803d;
}

.clear {
    background: #dc2626;
}

.clear:hover {
    background: #b91c1c;
}
</style>
</head>

<body>

<div class="calculator">
    <div class="brand">CASIO</div>
    <div id="display" class="display"></div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="append('0')" style="grid-column: span 2;">0</button>
        <button onclick="append('.')">.</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    display.innerText += value;
}

function clearDisplay() {
    display.innerText = "";
}

function deleteLast() {
    display.innerText = display.innerText.slice(0, -1);
}

function calculate() {
    try {
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
